name: CI (PRs/branches)

permissions:
  checks: write
  pull-requests: write

on:
  push:
    branches-ignore:
      - "root"

  pull_request:
  merge_group:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4

        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle properties
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-XX:MaxMetaspaceSize=5G" >> ~/.gradle/gradle.properties

      - name: Gradle (Setup)
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle (Build)
        run: "./gradlew checkLicenses build"

        env:
          NO_SIGNING: "true"

      - name: Publish test report
        uses: mikepenz/action-junit-report@v5

        if: success() || failure()

        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'

          include_passed: true
          detailed_summary: true
          comment: true

      - name: Upload JARs
        uses: actions/upload-artifact@v4

        with:
          name: Generator JARs
          path: "i18n-generator/build/libs/*.jar"

      - name: Upload JARs
        uses: actions/upload-artifact@v4

        with:
          name: Generator CLI JAR
          path: "i18n-generator/build/libs/*-all.jar"

